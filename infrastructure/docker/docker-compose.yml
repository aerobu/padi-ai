services:
  # PostgreSQL 17 Database with pgvector extension
  postgres:
    image: pgvector/pgvector:pg17
    container_name: padi-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: padi
      POSTGRES_PASSWORD: padi_secret
      POSTGRES_DB: padi
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U padi -d padi"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - padi-network

  # Redis 7 for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: padi-ai-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - padi-network

  # Ollama for local LLM serving (Qwen2.5)
  ollama:
    image: ollama/ollama:latest
    container_name: padi-ai-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:~/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - padi-network

  # Optional: Ollama worker for pulling models
  ollama-setup:
    image: ollama/ollama:latest
    container_name: padi-ai-ollama-setup
    depends_on:
      - ollama
    restart: "no"
    command: ["pull", "qwen2.5:72b"]
    volumes:
      - ollama_data:~/.ollama
    networks:
      - padi-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local

networks:
  padi-network:
    driver: bridge
