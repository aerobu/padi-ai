[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    --strict-markers
    --strict-config
    --tb=short
markers =
    unit: Pure unit tests (fast, isolated)
    integration: Integration tests (API, database, redis)
    e2e: End-to-end tests (full user flows)
    performance: Performance and load tests
    security: Security-related tests
    concurrency: Concurrency-sensitive tests (stateless, parallel)
    slow: Slow tests that take >1s
